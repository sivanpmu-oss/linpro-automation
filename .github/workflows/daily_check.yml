name: Daily Post Verification

on:
  schedule:
    # 23:30 Israel = 20:30 UTC (DST) | 21:30 UTC (winter) — both included; script-side guard
    - cron: '30 20 * * *'
    - cron: '30 21 * * *'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Israel local time is 23:xx
        id: timecheck
        run: |
          IL_HOUR=$(TZ='Asia/Jerusalem' date +%H)
          echo "Israel hour: $IL_HOUR"
          if [ "$IL_HOUR" != "23" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.timecheck.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.timecheck.outputs.skip == 'false'
        run: pip install requests

      - name: Run checker
        if: steps.timecheck.outputs.skip == 'false'
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/daily_post_checker.py
