name: Daily Linpro Post Publisher

on:
  schedule:
    # Run every hour. Script handles idempotency via published_log.json.
    # GitHub Actions free tier can delay scheduled jobs by hours — hourly cron + idempotency = robust.
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pillow

      - name: Run publisher
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python scripts/daily_post_publisher.py

      - name: Commit published log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain published_log.json)" ]; then
            git pull --rebase origin main || true
            git add published_log.json
            git commit -m "Log: published post on $(TZ='Asia/Jerusalem' date +%Y-%m-%d)"
            git push
          fi
