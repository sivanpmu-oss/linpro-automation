name: Daily Linpro Post Publisher

on:
  schedule:
    - cron: '0,15,30,45 19-23 * * *'
    - cron: '0,15,30,45 0-4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run publisher
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/daily_post_publisher.py

      - name: Commit published log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain published_log.json)" ]; then
            git pull --rebase origin main || true
            git add published_log.json
            git commit -m "Daily post log updated $(TZ='Asia/Jerusalem' date +%Y-%m-%d)"
            git push
          fi
