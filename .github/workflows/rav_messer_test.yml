name: Rav-Messer Auth Test
on:
  workflow_dispatch:
    inputs:
      expected_sha8:
        description: 'Expected SHA8 of client_secret (for verification)'
        required: false
        default: ''
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install requests
      - run: python scripts/rav_messer_test.py
        env:
          RAV_CLIENT_ID: ${{ secrets.RAV_CLIENT_ID }}
          RAV_CLIENT_SECRET: ${{ secrets.RAV_CLIENT_SECRET }}
          RAV_CLIENT_NAME: ${{ secrets.RAV_CLIENT_NAME }}
          RAV_USER_TOKEN: ${{ secrets.RAV_USER_TOKEN }}
          EXPECTED_SECRET_SHA8: ${{ inputs.expected_sha8 }}
