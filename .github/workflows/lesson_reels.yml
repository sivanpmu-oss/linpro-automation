name: Lesson Reels Publisher

on:
  schedule:
    # Target: 13:30 IL = 10:30 UTC (summer DST). Quad-cron 4x per hour for reliability.
    # Active window 10:00–17:00 UTC = 13:00–20:00 IL.
    - cron: '0,15,30,45 10-16 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run publisher
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python scripts/lesson_reels_publisher.py

      - name: Commit published log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain lessons_published_log.json)" ]; then
            git pull --rebase origin main || true
            git add lessons_published_log.json
            git commit -m "Lesson reel published $(TZ='Asia/Jerusalem' date +%Y-%m-%d)"
            git push
          fi
